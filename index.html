<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>СЛУЖБА РОССИИ - Cat Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; color: white; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; width: 100vw; height: 100vh; max-width: 800px; max-height: 600px; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); overflow: hidden; border: 2px solid #333; }
        canvas { width: 100%; height: 100%; display: block; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.95); text-align: center; z-index: 10; }
        
        h1 { color: #c0392b; text-shadow: 0 0 15px #c0392b; font-size: 36px; margin-bottom: 10px; }
        .btn-play { padding: 15px 50px; font-size: 22px; background: #c0392b; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 10px; }
        
        .btn-donate { padding: 10px 20px; font-size: 16px; background: #f1c40f; color: black; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; transition: 0.3s; }
        .btn-donate:hover { background: #fff; transform: scale(1.05); }

        #hud { position: absolute; top: 15px; left: 15px; display: none; font-size: 22px; font-weight: bold; color: gold; z-index: 5; }
        
        #cheat-box { display: none; margin-top: 15px; }
        #cheat-input { padding: 10px; background: #000; border: 1px solid #0f0; color: #0f0; text-align: center; outline: none; border-radius: 5px; }

        .final-img { width: 280px; border: 4px solid gold; border-radius: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="menu" class="screen">
        <h1>СЛУЖБА РОССИИ</h1>
        <p style="color: #888; margin-bottom: 20px;">СОБЕРИТЕ 1000 ОЧКОВ</p>
        
        <button class="btn-play" onclick="startGame()">ИГРАТЬ</button>
        <a href="https://tips.yandex.ru/guest/payment/3717752" target="_blank" class="btn-donate">🍩 ЗАДОНИТЬ РАЗРАБОТЧИКУ</a>

        <div id="cheat-box">
            <input type="text" id="cheat-input" placeholder="ПРОТОКОЛ...">
            <button onclick="applyCheat()" style="padding:10px; background:#222; color:white; border:none; border-radius: 5px; cursor:pointer;">OK</button>
        </div>
        <div style="position:absolute; bottom:15px; color:#333; cursor:pointer;" onclick="document.getElementById('cheat-box').style.display='block'">GoodGames</div>
    </div>

    <div id="hud">ОЧКИ: <span id="score-val">0</span> / 1000</div>
    <canvas id="canvas"></canvas>

    <div id="final" class="screen" style="display: none;">
        <h2 id="final-title" style="color: gold;">ИТОГ СЛУЖБЫ</h2>
        <img id="final-pic" src="" class="final-img">
        <p id="final-msg" style="padding: 0 20px; font-size: 18px;"></p>
        <button class="btn-play" onclick="location.reload()" style="background: #444;">В МЕНЮ</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 600;

    let score = 0;
    let isRunning = false;
    let cheatPutin = false;
    let cheatBread = false;
    let cheatCat = false; // НОВЫЙ ЧИТ
    let mouthAnim = 0;
    let globalSpeedMult = 1;

    const player = { x: 350, y: 530, w: 100, h: 25, originalW: 100 };
    const items = [];
    const enemies = [];
    const cats = []; // Массив для котов

    // Эмодзи котов для графики
    const catEmojis = ['🐱', '🐈', '😹', '😻', '😼', '😽'];

    function applyCheat() {
        const val = document.getElementById('cheat-input').value.toLowerCase();
        if (val === 'putin') { cheatPutin = true; score = 1000; startGame(); setTimeout(showEnding, 500); }
        else if (val === 'noputin') { cheatBread = true; startGame(); }
        else if (val === 'slow') { globalSpeedMult = 0.4; startGame(); }
        else if (val === 'fast') { globalSpeedMult = 2.5; startGame(); }
        else if (val === 'cat') { cheatCat = true; startGame(); } // АКТИВАЦИЯ КОТОВ
        else { alert("ПРОТОКОЛ НЕ НАЙДЕН"); }
    }

    function startGame() {
        document.getElementById('menu').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        isRunning = true;
        for(let i=0; i<3; i++) spawnItem();
        for(let i=0; i<2; i++) spawnEnemy();
        if (cheatCat) {
            for(let i=0; i<15; i++) spawnCat(); // Спавним много котов
        }
        gameLoop();
    }

    function spawnItem() { items.push({ x: Math.random()*760, y: -Math.random()*500, r: 12, speed: (3 + Math.random()*3) * globalSpeedMult }); }
    function spawnEnemy() { enemies.push({ x: Math.random()*760, y: -Math.random()*800, size: 30, speed: (2 + Math.random()*2) * globalSpeedMult }); }
    
    // Функция спавна прыгающего кота
    function spawnCat() {
        cats.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            emoji: catEmojis[Math.floor(Math.random() * catEmojis.length)],
            size: 30 + Math.random() * 20,
            speedX: (Math.random() - 0.5) * 8, // Случайная горизонтальная скорость
            speedY: (Math.random() - 0.5) * 8, // Случайная вертикальная скорость
            angle: Math.random() * Math.PI * 2, // Угол вращения
            rotationSpeed: (Math.random() - 0.5) * 0.2 // Скорость вращения
        });
    }

    function showEnding() {
        isRunning = false;
        document.getElementById('hud').style.display = 'none';
        const screen = document.getElementById('final');
        const img = document.getElementById('final-pic');
        const msg = document.getElementById('final-msg');
        screen.style.display = 'flex';

        if (cheatPutin) {
            img.src = "https://img.freepik.com/free-photo/prison-cell-bars-interior_23-2150824050.jpg";
            msg.innerText = "В. Путин: 'Использование читов на службе недопустимо. Пройдёмте.'";
        } else if (cheatCat) {
            img.src = "https://img.freepik.com/free-photo/view-cute-persian-cat_23-2151743144.jpg";
            msg.innerText = "В. Путин: 'Мяу! Служба окончена, время гладить котов.'";
        } else if (cheatBread && score >= 1000) {
            img.src = "https://img.freepik.com/free-photo/russia-flag-background_1150-17983.jpg";
            msg.innerText = "В. Путин: 'Хлеб — всему голова! Спасибо за службу.'";
        } else if (score >= 1000) {
            img.src = "https://img.freepik.com/free-photo/russia-flag-background_1150-17983.jpg";
            msg.innerText = "В. Путин: 'Это достойный результат! Поздравляю.'";
        } else {
            img.src = "https://img.freepik.com/free-photo/close-up-of-russian-flag_23-2148154181.jpg";
            msg.innerText = `Служба окончена. Собрано очков: ${score}.`;
        }
    }

    function gameLoop() {
        if (!isRunning) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (mouthAnim > 0) { player.w = player.originalW + mouthAnim; mouthAnim -= 1; }
        else { player.w = player.originalW; }

        ctx.fillStyle = cheatBread ? "#f1c40f" : "#2980b9";
        ctx.fillRect(player.x, player.y, player.w, player.h);

        // Отрисовка и логика Котов (перекрывают всё)
        if (cheatCat) {
            ctx.font = "40px Arial";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            
            cats.forEach(cat => {
                // Движение и отскок от стен
                cat.x += cat.speedX;
                cat.y += cat.speedY;
                cat.angle += cat.rotationSpeed;

                if (cat.x < 0 || cat.x > canvas.width) cat.speedX *= -1;
                if (cat.y < 0 || cat.y > canvas.height) cat.speedY *= -1;

                // Отрисовка с вращением
                ctx.save();
                ctx.translate(cat.x, cat.y);
                ctx.rotate(cat.angle);
                ctx.fillText(cat.emoji, 0, 0);
                ctx.restore();
            });
        }

        items.forEach(it => {
            it.y += it.speed;
            ctx.fillStyle = "gold";
            ctx.beginPath(); ctx.arc(it.x, it.y, it.r, 0, Math.PI*2); ctx.fill();
            if (it.y > canvas.height) { it.y = -20; it.x = Math.random()*760; }
            if (it.y + it.r > player.y && it.x > player.x && it.x < player.x + player.w) {
                // Очки начисляются, даже если коты мешают
                score += 50; document.getElementById('score-val').innerText = score;
                it.y = -20; mouthAnim = 15;
                if (score >= 1000) showEnding();
            }
        });

        enemies.forEach(en => {
            en.y += en.speed;
            if (cheatBread) { ctx.fillStyle = "#d35400"; ctx.fillRect(en.x, en.y, en.size, en.size/1.5); }
            else { ctx.fillStyle = "#ff0044"; ctx.fillRect(en.x, en.y, en.size, en.size); }
            
            if (en.y > canvas.height) { en.y = -50; en.x = Math.random()*760; }
            if (en.y + en.size > player.y && en.x + en.size > player.x && en.x < player.x + player.w) {
                if (cheatBread) {
                    score += 100; document.getElementById('score-val').innerText = score;
                    en.y = -50; en.x = Math.random()*760;
                    mouthAnim = 30;
                    if (score >= 1000) showEnding();
                } else if (!cheatCat) { // Вирусы не убивают в кошачьем режиме
                    showEnding();
                }
            }
        });
        requestAnimationFrame(gameLoop);
    }

    function handleInput(e) {
        const rect = canvas.getBoundingClientRect();
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        player.x = (clientX - rect.left) * (canvas.width / rect.width) - player.w / 2;
        if (player.x < 0) player.x = 0;
        if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;
    }
    canvas.addEventListener('mousemove', handleInput);
    canvas.addEventListener('touchmove', handleInput, {passive: false});
</script>
</body>
</html>
